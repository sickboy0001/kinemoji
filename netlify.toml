[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Netlifyでのビルド時に使用するNode.jsのバージョンを指定
  NODE_VERSION = "20"
  # Playwright/Chromium/Sharpを使用するため、Edge Runtimeは無効にする必要があります
  NEXT_USE_NETLIFY_EDGE = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions."*"]
  # サーバーレス関数の設定（GIF生成などでタイムアウトしやすいため）
  included_files = ["node_modules/playwright-core/**", "node_modules/@sparticuz/chromium/**", "package.json"]
  # サーバーレス関数のタイムアウト時間を延ばす（最大60秒、デフォルト10秒）
  timeout = 60
  
  # Background Functions 設定
  [functions.kinemoji-gif-background]
  # Background Function として登録
  background = true
  # 最大 15 分（900 秒）まで実行可能
  timeout = 900
  # 必要なファイルを含める
  included_files = ["node_modules/playwright-core/**", "node_modules/@sparticuz/chromium/**", "node_modules/@libsql/**", "node_modules/drizzle-orm/**", "package.json"]
