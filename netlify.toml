[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NEXT_USE_NETLIFY_EDGE = "false"

[[plugins]]
package = "@netlify/plugin-nextjs"

[functions]
external_node_modules = ["@sparticuz/chromium", "@libsql/client"]

[functions.kinemoji-gif-background]
background = true
timeout = 900
