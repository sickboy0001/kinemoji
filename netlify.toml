[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NEXT_USE_NETLIFY_EDGE = "false"

[[plugins]]
package = "@netlify/plugin-nextjs"

[functions]
node_bundle = true
external_node_modules = ["@sparticuz/chromium-min"]
included_files = ["node_modules/@sparticuz/chromium-min/**"]

[functions.kinemoji-gif-background]
background = true
timeout = 900
included_files = ["node_modules/@sparticuz/chromium-min/**", "node_modules/@libsql/**", "node_modules/drizzle-orm/**"]
